name: Deploy GAS Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: printf '%s' '${{ secrets.CLASPRC_JSON }}' > "$HOME/.clasprc.json"

      - name: Restore clasp project file
        run: printf '%s' '${{ secrets.CLASP_JSON }}' > .clasp.json

      - name: Push project
        run: clasp push -f

      - name: Create version
        run: clasp create-version "GitHub Actions ${GITHUB_SHA}"

      - name: Update web app deployment
        run: >
          clasp update-deployment "${{ secrets.GAS_DEPLOYMENT_ID }}"
          --description "GitHub Actions ${GITHUB_SHA}"

      - name: Sync Script Properties
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          deployment_id = os.environ["GAS_DEPLOYMENT_ID"]
          url = f"https://script.google.com/macros/s/{deployment_id}/exec"
          payload = {
              "action": "syncScriptPropertiesFromCi",
              "adminToken": os.environ["ADMIN_API_TOKEN"],
              "params": {
                  "ADMIN_API_TOKEN": os.environ["ADMIN_API_TOKEN"],
                  "SLACK_BOT_TOKEN": os.environ["SLACK_BOT_TOKEN"],
                  "SLACK_CHANNEL_ID": os.environ["SLACK_CHANNEL_ID"],
                  "SPREADSHEET_ID": os.environ["SPREADSHEET_ID"],
              },
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json; charset=utf-8"},
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  body = json.load(resp)
          except urllib.error.HTTPError as err:
              body = err.read().decode()
              raise SystemExit(body)

          if not body.get("ok"):
              raise SystemExit(json.dumps(body, ensure_ascii=False))

          print(json.dumps(body, ensure_ascii=False))
          PY
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

      - name: Ensure sheet and triggers
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          deployment_id = os.environ["GAS_DEPLOYMENT_ID"]
          url = f"https://script.google.com/macros/s/{deployment_id}/exec"
          payload = {
              "action": "setupProjectFromCi",
              "adminToken": os.environ["ADMIN_API_TOKEN"],
              "reinstallTriggers": True,
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json; charset=utf-8"},
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  body = json.load(resp)
          except urllib.error.HTTPError as err:
              body = err.read().decode()
              raise SystemExit(body)

          if not body.get("ok"):
              raise SystemExit(json.dumps(body, ensure_ascii=False))

          print(json.dumps(body, ensure_ascii=False))
          PY
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}

name: Deploy GAS Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: printf '%s' '${{ secrets.CLASPRC_JSON }}' > "$HOME/.clasprc.json"

      - name: Restore clasp project file
        run: printf '%s' '${{ secrets.CLASP_JSON }}' > .clasp.json

      - name: Push project
        run: clasp push -f

      - name: Sync Script Properties
        run: >
          clasp run-function syncScriptPropertiesFromCi
          --params '[
            {
              "SLACK_BOT_TOKEN": "${{ secrets.SLACK_BOT_TOKEN }}",
              "SLACK_CHANNEL_ID": "${{ secrets.SLACK_CHANNEL_ID }}",
              "SPREADSHEET_ID": "${{ secrets.SPREADSHEET_ID }}"
            }
          ]'

      - name: Ensure sheet and triggers
        run: >
          clasp run-function setupProjectFromCi
          --params '[true]'

      - name: Create version
        run: clasp create-version "GitHub Actions ${GITHUB_SHA}"

      - name: Update web app deployment
        run: >
          clasp update-deployment "${{ secrets.GAS_DEPLOYMENT_ID }}"
          --description "GitHub Actions ${GITHUB_SHA}"
